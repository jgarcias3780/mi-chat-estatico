<html>
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
		<link rel="stylesheet" href="chat.css"> 
	</head>
	<body>
		<br/>
		<center><button id="chatbot-button"><span class="icon">💬</span> Latest Version</button>
		<button id="chatbot-button2"><span class="icon">💬</span> 11.2.5</button></center>
		<br/>
		<div id="chatbot-window">
			<div id="chatbot-header">Bizagi Assistant
			</div>
			<div id="chatbot-messages"></div>
			<div id="chatbot-input">
				<input type="text" id="chatbot-question" placeholder="What do you want to know?" onkeypress="if(event.key==='Enter'){event.preventDefault();document.getElementById('chatbot-send').click();}">
				<button id="chatbot-send">Ask</button>
			</div>
		</div>
		<script src="chat.js"></script>
	</body>
</html>
